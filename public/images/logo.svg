    M 282,220
    L 465,210
    C 490,240 475,285 445,292
    L 295,268
    Z
  "/>

  <!-- Tre puntini vicino al becco -->
  <circle fill="currentColor" cx="445" cy="306" r="14"/>
  <circle fill="currentColor" cx="468" cy="332" r="11"/>
  <circle fill="currentColor" cx="420" cy="334" r="11"/>
</svg>
