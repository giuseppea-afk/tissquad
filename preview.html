<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anteprima Badge — Tissquad x Amazon Shipping</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* Simulated product page card */
    .product-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .product-title {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .product-price {
      font-size: 22px;
      color: #e47911;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .btn-add-to-cart {
      display: block;
      width: 100%;
      padding: 14px;
      background: #e47911;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .btn-add-to-cart:hover { background: #c96a00; }

    /* ── shipping badge ── */
    .shipping-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-top: 12px;
      background-color: #fff8f0;
      border: 1px solid #f0a500;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
      width: 100%;
      justify-content: center;
    }

    .shipping-badge__icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .shipping-badge__icon svg {
      width: 18px;
      height: 18px;
      fill: #f0a500;
    }

    .shipping-badge__separator {
      margin: 0 2px;
      color: #888;
      font-weight: 400;
    }

    .shipping-badge__amazon {
      color: #e47911;
    }
  </style>
</head>
<body>

  <div class="product-card">
    <div class="product-title">Nome Prodotto</div>
    <div class="product-price">€ 29,90</div>

    <button class="btn-add-to-cart">Aggiungi al Carrello</button>

    <!-- BADGE -->
    <div class="shipping-badge">
      <span class="shipping-badge__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" aria-hidden="true">
          <path d="M48 0C21.5 0 0 21.5 0 48v272c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h32c17.7 0 32-14.3 32-32V320 288 237.3c0-17-6.7-33.3-18.7-45.3L512 114.7c-12-12-28.3-18.7-45.3-18.7H416V48c0-26.5-21.5-48-48-48H48zM416 160h50.7L544 237.3V256H416V160zM208 416a48 48 0 1 1 -96 0 48 48 0 1 1 96 0zm272 48a48 48 0 1 1 0-96 48 48 0 1 1 0 96z"/>
        </svg>
      </span>
      <span class="shipping-badge__text">
        Spedito da <strong>Tissquad</strong>
        <span class="shipping-badge__separator">×</span>
        <strong class="shipping-badge__amazon">Amazon Shipping</strong>
      </span>
    </div>
  </div>

</body>
</html>
